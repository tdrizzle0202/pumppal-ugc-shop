const STATE = { tab: 'visual', body: 'all', text: new Set(), visual: new Set(), beats: new Set(), minSaves: 0, sort: 'saves', q: '' };

const PICKS = { hook: null, exercises: [], cta: null };
function savePicks() {}

function isPicked(item) {
  if (!item) return false;
  if (item.kind === 'hook') return PICKS.hook && PICKS.hook.url === item.url;
  if (item.kind === 'cta') return PICKS.cta && PICKS.cta.url === item.url;
  if (item.kind === 'exercise') return PICKS.exercises.some(e => e.url === item.url);
  return false;
}

function canPick(item) {
  if (!item) return false;
  if (isPicked(item)) return true;
  if (item.kind === 'hook') return !PICKS.hook;
  if (item.kind === 'cta') return !PICKS.cta;
  if (item.kind === 'exercise') {
    if (PICKS.exercises.length >= 3) return false;
    return !PICKS.exercises.some(e => e.exercise_slug === item.exercise_slug);
  }
  return false;
}

function togglePick(item) {
  if (!item) return;
  if (item.kind === 'hook') {
    PICKS.hook = isPicked(item) ? null : { url: item.url, hook_text: item.hook_text || item.opening_frame || '', creator: item.creator, tiktok: item.tiktok };
  } else if (item.kind === 'cta') {
    PICKS.cta = isPicked(item) ? null : { url: item.url, overlay_text: item.overlay_text || '', voiceover_text: item.voiceover_text || '', creator: item.creator, tiktok: item.tiktok };
  } else if (item.kind === 'exercise') {
    if (isPicked(item)) {
      PICKS.exercises = PICKS.exercises.filter(e => e.url !== item.url);
    } else if (canPick(item)) {
      PICKS.exercises.push({ url: item.url, exercise_slug: item.exercise_slug, exercise_name: item.exercise_name, creator: item.creator, tiktok: item.tiktok });
    } else {
      return;
    }
  }
  savePicks();
  refreshCardStates();
  updateFinishBar();
}

function refreshCardStates() {
  document.querySelectorAll('.card[data-card-url]').forEach(card => {
    const url = card.dataset.cardUrl;
    const item = findItemByUrl(url);
    if (!item) return;
    const picked = isPicked(item);
    const disabled = !picked && !canPick(item);
    card.classList.toggle('picked', picked);
    card.classList.toggle('pick-disabled', disabled);
    const btn = card.querySelector('.pick-btn[data-pick]');
    if (btn) btn.textContent = picked ? '✓' : '+';
  });
}

function findItemByUrl(url) {
  return DATA.hooks.find(h => h.url === url) ||
         DATA.exercises.find(e => e.url === url) ||
         DATA.ctas.find(c => c.url === url);
}

function findRefByUrl(url) {
  return DATA.references.find(r => r.url === url) ||
         DATA.winners.find(w => w.url === url);
}

function handlePick(btn) {
  const url = decodeURIComponent(btn.dataset.pick);
  const item = findItemByUrl(url);
  if (item) togglePick(item);
}

function handleCopy(btn) {
  const url = decodeURIComponent(btn.dataset.copy);
  const item = findRefByUrl(url);
  if (!item) return;
  if (item.hook_pick) PICKS.hook = item.hook_pick;
  if (item.exercise_picks && item.exercise_picks.length) PICKS.exercises = item.exercise_picks.slice(0, 3);
  savePicks(); refreshCardStates(); updateFinishBar();
}

function setSlot(id, filled, label) {
  const slot = document.getElementById(id);
  if (!slot) return;
  slot.classList.toggle('filled', filled);
  slot.innerHTML = `<span>${label}</span>${filled ? '<span class="x">×</span>' : ''}`;
}

function updateFinishBar() {
  setSlot('slot-hook', !!PICKS.hook, 'Hook');
  for (let i = 0; i < 3; i++) {
    const e = PICKS.exercises[i];
    setSlot('slot-ex' + i, !!e, e ? e.exercise_name : 'Ex ' + (i+1));
  }
  setSlot('slot-cta', !!PICKS.cta, 'CTA');
  const ready = !!PICKS.hook && PICKS.exercises.length === 3 && !!PICKS.cta;
  document.getElementById('finish-btn').disabled = !ready;
}

function removeSlot(slotId) {
  if (slotId === 'slot-hook') PICKS.hook = null;
  else if (slotId === 'slot-cta') PICKS.cta = null;
  else if (slotId.startsWith('slot-ex')) {
    const idx = parseInt(slotId.slice(7), 10);
    if (PICKS.exercises[idx]) PICKS.exercises.splice(idx, 1);
  }
  savePicks(); refreshCardStates(); updateFinishBar();
}

function gotoFinish() {
  const p = encodeURIComponent(JSON.stringify(PICKS));
  window.location.href = 'picks.html?p=' + p;
}

function perfDot(rate) {
  if (rate >= 0.05) return '<span class="perf hot">' + (rate*100).toFixed(1) + '% save</span>';
  if (rate >= 0.02) return '<span class="perf">' + (rate*100).toFixed(1) + '% save</span>';
  return '';
}

function fmtNum(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return String(n);
}

function copyUrl(btn, url) {
  const full = url;
  navigator.clipboard.writeText(full).then(() => {
    const t = btn.textContent;
    btn.textContent = '✓ copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t; btn.classList.remove('copied'); }, 1500);
  });
}

function bodyMatches(item) {
  if (STATE.body === 'all') return true;
  // Items with no body_group always pass through (don't get hidden by body filter)
  if (!item.body_group) return true;
  return item.body_group === STATE.body;
}

function savesMatches(item) {
  if (!STATE.minSaves) return true;
  return (item.saves || 0) >= STATE.minSaves;
}

function sortItems(items) {
  const arr = items.slice();
  if (STATE.sort === 'save_rate') arr.sort((a,b) => (b.save_rate || 0) - (a.save_rate || 0));
  else if (STATE.sort === 'saves_asc') arr.sort((a,b) => (a.saves || 0) - (b.saves || 0));
  else arr.sort((a,b) => (b.saves || 0) - (a.saves || 0));
  return arr;
}

function searchMatches(item, fields) {
  if (!STATE.q) return true;
  const q = STATE.q.toLowerCase();
  return fields.some(f => (item[f] || '').toString().toLowerCase().includes(q));
}

function renderCard(item, opts={}) {
  const url = item.url || '';
  const creator = item.creator ? '@' + item.creator : '';
  const tiktok = item.tiktok || '';
  const creatorLink = tiktok ? `<a href="${tiktok}" target="_blank" onclick="event.stopPropagation()">${creator}</a>` : creator;
  const title = opts.title || '';
  const subParts = [creatorLink];
  if (item.views && !opts.topPill) subParts.push(fmtNum(item.views) + ' views');
  const topPill = opts.topPill ? `<span class="perf">${opts.topPill}</span>` : '';
  const media = item.kind === 'winner' && !url ?
      `<img class="cover" src="${item.cover}" loading="lazy">` :
      `<video data-src="${url}" preload="none" playsinline muted loop></video>`;
  const pickable = item.kind === 'hook' || item.kind === 'exercise' || item.kind === 'cta';
  const copyable = (item.kind === 'reference' || item.kind === 'winner') && (item.hook_pick || (item.exercise_picks && item.exercise_picks.length));
  const picked = pickable && isPicked(item);
  const disabled = pickable && !picked && !canPick(item);
  const classes = ['card'];
  if (picked) classes.push('picked');
  if (disabled) classes.push('pick-disabled');
  let pickBtn = '';
  if (pickable) {
    pickBtn = `<button class="pick-btn" data-pick="${encodeURIComponent(url)}" onclick="event.stopPropagation();handlePick(this)">${picked ? '✓' : '+'}</button>`;
  } else if (copyable) {
    pickBtn = `<button class="pick-btn" data-copy="${encodeURIComponent(url)}" onclick="event.stopPropagation();handleCopy(this)" title="Use this whole video">+</button>`;
  }
  const urlBtn = (item.kind === 'reference' || item.kind === 'winner') && url
    ? `<button class="copy-btn" onclick="event.stopPropagation();copyUrl(this, '${url}')">Copy URL</button>`
    : '';
  return `<div class="${classes.join(' ')}" data-card-url="${url}" onclick="toggleMute(this)">
    <div class="media-wrap">
      ${media}
      ${topPill}
      ${pickBtn}
      ${urlBtn}
    </div>
    <div class="meta">
      <div class="title">${title || '&nbsp;'}</div>
      <div class="sub">${subParts.join(' · ')}</div>
    </div>
  </div>`;
}

function toggleMute(card) {
  const v = card.querySelector('video');
  if (!v) return;
  if (v.paused) {
    // Pause any other playing video first (one at a time = less bandwidth)
    document.querySelectorAll('video').forEach(other => { if (other !== v) other.pause(); });
    v.play().catch(()=>{});
  } else {
    v.muted = !v.muted;
  }
}

function renderVisual() {
  const root = document.getElementById('grid-visual');
  const items = sortItems(DATA.hooks.filter(h => {
    if (!savesMatches(h)) return false;
    for (const v of STATE.visual) if (!h['visual_' + v]) return false;
    if (!searchMatches(h, ['hook_text', 'creator', 'opening_frame'])) return false;
    return true;
  }));
  if (!items.length) { root.innerHTML = '<div class="empty">No hooks match.</div>'; return; }
  const groups = {};
  for (const h of items) {
    const k = h.creator || 'unknown';
    (groups[k] = groups[k] || []).push(h);
  }
  const HOOK_ORDER = ['notbyami', 'islarune', 'heloomelloo', 'sashalusslover'];
  const entries = Object.entries(groups).sort((a,b) => {
    const ia = HOOK_ORDER.indexOf(a[0]); const ib = HOOK_ORDER.indexOf(b[0]);
    const ra = ia === -1 ? 999 : ia; const rb = ib === -1 ? 999 : ib;
    if (ra !== rb) return ra - rb;
    return b[1].length - a[1].length;
  });
  root.innerHTML = entries.map(([creator, clips]) => {
    const cards = clips.map(h => renderCard(h, { title: h.opening_frame || h.hook_text, topPill: h.views ? fmtNum(h.views) + ' views' : '' })).join('');
    return `<div class="ex-section"><h3>@${creator}<span class="ex-count">${clips.length} hook${clips.length>1?'s':''}</span></h3><div class="carousel">${cards}</div></div>`;
  }).join('');
}

function renderExercises() {
  const root = document.getElementById('grid-exercises');
  const items = DATA.exercises.filter(e => {
    if (!bodyMatches(e)) return false;
    if (!searchMatches(e, ['exercise_name','exercise_slug','creator'])) return false;
    return true;
  });
  if (!items.length) { root.innerHTML = '<div class="empty">No exercises match.</div>'; return; }
  const groups = {};
  for (const e of items) {
    (groups[e.exercise_slug] = groups[e.exercise_slug] || []).push(e);
  }
  const entries = Object.entries(groups).sort((a,b) => b[1].length - a[1].length);
  const SHOWN = 30;
  const visible = entries.slice(0, SHOWN);
  const hidden = entries.length - visible.length;
  const sections = visible.map(([slug, clips]) => {
    const name = clips[0].exercise_name;
    const cards = clips.map(c => renderCard(c, { title: c.exercise_name })).join('');
    return `<div class="ex-section" id="section-${slug}"><h3>${name}<span class="ex-count">${clips.length} clip${clips.length>1?'s':''}</span></h3><div class="carousel">${cards}</div></div>`;
  }).join('');
  const tail = hidden > 0 ? `<div class="more-hint">+${hidden} more exercises — search to narrow</div>` : '';
  root.innerHTML = sections + tail;
  const jumpRow = document.getElementById('exercise-jump-row');
  const jumpChips = visible.map(([slug, clips]) => `<button class="chip jump-chip" data-jump="section-${slug}">${clips[0].exercise_name}</button>`).join('');
  jumpRow.innerHTML = jumpChips;
}

function renderCTAs() {
  const root = document.getElementById('grid-ctas');
  const items = DATA.ctas.filter(c => {
    if (!searchMatches(c, ['overlay_text','voiceover_text','creator'])) return false;
    return true;
  });
  if (!items.length) { root.innerHTML = '<div class="empty">No CTAs match.</div>'; return; }
  root.innerHTML = `<div class="grid">${items.map(c => renderCard(c, { title: c.overlay_text || c.voiceover_text || '' })).join('')}</div>`;
}

function renderReferences() {
  const root = document.getElementById('grid-references');
  const items = sortItems(DATA.references.filter(r => {
    if (!bodyMatches(r)) return false;
    if (!savesMatches(r)) return false;
    return true;
  }));
  if (!items.length) { root.innerHTML = '<div class="empty">No references match.</div>'; return; }
  const groups = {};
  for (const r of items) {
    const k = r.creator || 'unknown';
    (groups[k] = groups[k] || []).push(r);
  }
  const entries = Object.entries(groups).sort((a,b) => b[1].length - a[1].length);
  root.innerHTML = entries.map(([creator, clips]) => {
    const cards = clips.map(r => renderCard(r, { title: r.title || r.video_id })).join('');
    return `<div class="ex-section"><h3>@${creator}<span class="ex-count">${clips.length} clip${clips.length>1?'s':''}</span></h3><div class="carousel">${cards}</div></div>`;
  }).join('');
}

function renderWinners() {
  const grid = document.getElementById('grid-winners');
  const items = sortItems(DATA.winners.filter(w => bodyMatches(w) && savesMatches(w) && searchMatches(w, ['title'])));
  if (!items.length) { grid.innerHTML = '<div class="empty">No winners yet.</div>'; return; }
  grid.innerHTML = items.map(w => renderCard(w, { title: w.title || `${fmtNum(w.saves)} saves` })).join('');
}

const RENDERED = { visual: false, exercises: false, ctas: false, winners: false, references: false };

function renderActive() {
  const t = STATE.tab;
  if (t === 'visual') { renderVisual(); RENDERED.visual = true; }
  if (t === 'exercises') { renderExercises(); RENDERED.exercises = true; }
  if (t === 'ctas') { renderCTAs(); RENDERED.ctas = true; }
  if (t === 'winners') { renderWinners(); RENDERED.winners = true; }
  if (t === 'references') { renderReferences(); RENDERED.references = true; }
  wireVideos();
}

function invalidateAll() {
  RENDERED.visual = RENDERED.exercises = RENDERED.ctas = RENDERED.winners = RENDERED.references = false;
}

function render() { invalidateAll(); renderActive(); }

function setTab(tab) {
  STATE.tab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  document.querySelectorAll('[data-tabs]').forEach(row => {
    const tabs = (row.dataset.tabs || '').split(',');
    row.style.display = tabs.includes(tab) ? '' : 'none';
  });
  if (!RENDERED[tab]) renderActive();
}

function bindFilters() {
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => setTab(t.dataset.tab));
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-jump]');
    if (!btn) return;
    const target = document.getElementById(btn.dataset.jump);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  document.getElementById('finish-bar').addEventListener('click', (e) => {
    const slot = e.target.closest('.slot.filled');
    if (slot) removeSlot(slot.id);
  });
  document.querySelectorAll('.chip[data-body]').forEach(c => c.onclick = () => {
    document.querySelectorAll('.chip[data-body]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    STATE.body = c.dataset.body;
    render();
  });
  document.querySelectorAll('.chip[data-visual]').forEach(c => c.onclick = () => {
    c.classList.toggle('active');
    if (c.classList.contains('active')) STATE.visual.add(c.dataset.visual);
    else STATE.visual.delete(c.dataset.visual);
    renderVisual();
  });
  document.querySelectorAll('.chip[data-beat]').forEach(c => c.onclick = () => {
    c.classList.toggle('active');
    if (c.classList.contains('active')) STATE.beats.add(c.dataset.beat);
    else STATE.beats.delete(c.dataset.beat);
    renderCTAs();
  });
  document.querySelectorAll('.chip[data-saves]').forEach(c => c.onclick = () => {
    document.querySelectorAll('.chip[data-saves]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    STATE.minSaves = parseInt(c.dataset.saves, 10) || 0;
    render();
  });
  document.querySelectorAll('.chip[data-sort]').forEach(c => c.onclick = () => {
    document.querySelectorAll('.chip[data-sort]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    STATE.sort = c.dataset.sort;
    render();
  });
}

document.getElementById('cnt-visual').textContent = DATA.hooks.length;
document.getElementById('cnt-exercises').textContent = DATA.exercises.length;
document.getElementById('cnt-ctas').textContent = DATA.ctas.length;
document.getElementById('cnt-winners').textContent = DATA.winners.length;
document.getElementById('cnt-references').textContent = DATA.references.length;

// Autoplay-on-scroll. Videos load + play muted when in viewport, pause when out.
const io = new IntersectionObserver((entries) => {
  for (const e of entries) {
    const v = e.target;
    if (e.isIntersecting) {
      if (!v.src && v.dataset.src) v.src = v.dataset.src;
      v.play().catch(()=>{});
    } else {
      v.pause();
    }
  }
}, { threshold: 0.05, rootMargin: '0px 100px' });

function wireVideos() {
  document.querySelectorAll('video[data-src]').forEach(v => {
    if (!v.dataset.observed) {
      v.dataset.observed = '1';
      io.observe(v);
    }
  });
}

bindFilters();
setTab('visual');
renderActive();
updateFinishBar();
</script>
</body>
