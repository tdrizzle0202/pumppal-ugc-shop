  header {

  .brand {

  .brand .sub { color: var(--ink-3); font-size: 13px; }
  .tabs { padding: 0 12px; display: flex; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }

  .tab {

    border-radius: 0; border-bottom: 2px solid transparent;
    margin-bottom: -1px; white-space: nowrap;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--ink); }
  .tab .count { color: var(--ink-3); margin-left: 6px; font-weight: 400; font-size: 12px; }
  .toolbar {
    padding: 14px 24px;
    display: flex; flex-direction: column; gap: 8px;
    border-top: 1px solid var(--line);

  }
  .filter-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .filter-label {

    margin-right: 6px; min-width: 56px; display: inline-block;
  }
  .chip {

  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .search {
    width: 100%; max-width: 340px;
    position: relative;
  }
  .search input {
    width: 100%; padding: 8px 14px 8px 32px;
    background: var(--surface); border: 1px solid var(--line);

    -webkit-appearance: none;

  .panel { display: none; padding: 28px 24px 80px; max-width: 1400px; margin: 0 auto; }
  .panel.active { display: block; }
  .grid {

    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .card {

    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    cursor: pointer;

  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

    background: rgba(255,255,255,0.95); color: var(--ink);

    btn.textContent = '✓ copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t; btn.classList.remove('copied'); }, 1500);
  });
}

function bodyMatches(item) {
  if (STATE.body === 'all') return true;
  // Items with no body_group always pass through (don't get hidden by body filter)
  if (!item.body_group) return true;
  return item.body_group === STATE.body;
}

function savesMatches(item) {
  if (!STATE.minSaves) return true;
  return (item.saves || 0) >= STATE.minSaves;
}

function sortItems(items) {
  const arr = items.slice();
  if (STATE.sort === 'save_rate') arr.sort((a,b) => (b.save_rate || 0) - (a.save_rate || 0));
  else if (STATE.sort === 'saves_asc') arr.sort((a,b) => (a.saves || 0) - (b.saves || 0));
  else arr.sort((a,b) => (b.saves || 0) - (a.saves || 0));
  return arr;
}

function searchMatches(item, fields) {
  if (!STATE.q) return true;
  const q = STATE.q.toLowerCase();
  return fields.some(f => (item[f] || '').toString().toLowerCase().includes(q));
}

function renderCard(item, opts={}) {
  const url = item.url || '';
  const perf = perfDot(item.save_rate || 0);
  const creator = item.creator ? '@' + item.creator : '';
  const tiktok = item.tiktok || '';
  const creatorLink = tiktok ? `<a href="${tiktok}" target="_blank" onclick="event.stopPropagation()">${creator}</a>` : creator;
  const title = opts.title || '';
  const subParts = [creatorLink];
  if (item.saves) subParts.push(fmtNum(item.saves) + ' saves');
  else if (item.views) subParts.push(fmtNum(item.views));
  const media = item.kind === 'winner' && !url ?
      `<img class="cover" src="${item.cover}" loading="lazy">` :
      `<video data-src="${url}" preload="none" playsinline muted loop></video>`;
  return `<div class="card" onclick="toggleMute(this)">
    ${media}
    ${perf}
    ${url ? `<button class="copy-btn" onclick="event.stopPropagation();copyUrl(this, '${url}')">Copy URL</button>` : ''}
    <div class="meta">
      <div class="title">${title || '&nbsp;'}</div>
      <div class="sub">${subParts.join(' · ')}</div>
    </div>
  </div>`;
}

function toggleMute(card) {
  const v = card.querySelector('video');
  if (!v) return;
  if (v.paused) {
    // Pause any other playing video first (one at a time = less bandwidth)
    document.querySelectorAll('video').forEach(other => { if (other !== v) other.pause(); });
    v.play().catch(()=>{});
  } else {
    v.muted = !v.muted;
  }
}

function renderVisual() {
  const grid = document.getElementById('grid-visual');
  const items = sortItems(DATA.hooks.filter(h => {
    if (STATE.creator !== 'all' && h.creator !== STATE.creator) return false;
    if (!savesMatches(h)) return false;
    for (const v of STATE.visual) if (!h['visual_' + v]) return false;
    if (!searchMatches(h, ['hook_text', 'creator', 'opening_frame'])) return false;
    return true;
  }));
  if (!items.length) { grid.innerHTML = '<div class="empty">No hooks match.</div>'; return; }
  grid.innerHTML = items.map(h => renderCard(h, { title: h.opening_frame || h.hook_text })).join('');
}

function renderExercises() {
  const root = document.getElementById('grid-exercises');
  const items = DATA.exercises.filter(e => {
    if (!bodyMatches(e)) return false;
    if (!searchMatches(e, ['exercise_name','exercise_slug','creator'])) return false;
    return true;
  });
  if (!items.length) { root.innerHTML = '<div class="empty">No exercises match.</div>'; return; }
  const groups = {};
  for (const e of items) {
    (groups[e.exercise_slug] = groups[e.exercise_slug] || []).push(e);
  }
  const entries = Object.entries(groups).sort((a,b) => b[1].length - a[1].length);
  const SHOWN = 30;
  const visible = entries.slice(0, SHOWN);
  const hidden = entries.length - visible.length;
  const sections = visible.map(([slug, clips]) => {
    const name = clips[0].exercise_name;
    const showClips = clips.slice(0, 4);
    const more = clips.length - showClips.length;
    const cards = showClips.map(c => renderCard(c, { title: c.exercise_name })).join('');
    const moreStr = more > 0 ? ` <span style="color:var(--ink-3);font-weight:400">+${more} more</span>` : '';
    return `<div class="ex-section"><h3>${name}<span class="ex-count">${clips.length} clip${clips.length>1?'s':''}${moreStr}</span></h3><div class="grid">${cards}</div></div>`;
  }).join('');
  const tail = hidden > 0 ? `<div class="more-hint">+${hidden} more exercises — search to narrow</div>` : '';
  root.innerHTML = sections + tail;
}

function renderCTAs() {
  const grid = document.getElementById('grid-ctas');
  const items = DATA.ctas.filter(c => {
    const beats = (c.beats || []).map(b => String(b).toLowerCase());
    for (const b of STATE.beats) if (!beats.includes(b)) return false;
    if (!searchMatches(c, ['overlay_text','voiceover_text','creator'])) return false;
    return true;
  });
  if (!items.length) { grid.innerHTML = '<div class="empty">No CTAs match.</div>'; return; }
  grid.innerHTML = items.map(c => renderCTACard(c)).join('');
}

function renderCTACard(c) {
  const creator = c.creator ? '@' + c.creator : '';
  const tiktok = c.tiktok || '';
  const creatorLink = tiktok ? `<a href="${tiktok}" target="_blank" onclick="event.stopPropagation()">${creator}</a>` : creator;
  const beatLine = (c.beats && c.beats.length)
      ? c.beats.map(b => b[0].toUpperCase() + b.slice(1)).join(' · ')
      : '';
  const ctaText = c.voiceover_text || c.overlay_text || '';
  return `<div class="card cta-card" onclick="toggleMute(this)">
    <video data-src="${c.url}" preload="none" playsinline muted loop></video>
    <button class="copy-btn" onclick="event.stopPropagation();copyUrl(this, '${c.url}')">Copy URL</button>
    <div class="meta">
      ${beatLine ? `<div class="title">${beatLine}</div>` : ''}
      <div class="sub">${creatorLink}</div>
      ${ctaText ? `<div class="cta-text">${ctaText}</div>` : ''}
    </div>
  </div>`;
}

function renderReferences() {
  const grid = document.getElementById('grid-references');
  const items = sortItems(DATA.references.filter(r => {
    if (!bodyMatches(r)) return false;
    if (STATE.refCreator !== 'all' && r.creator !== STATE.refCreator) return false;
    if (!savesMatches(r)) return false;
    return true;
  }));
  if (!items.length) { grid.innerHTML = '<div class="empty">No references match.</div>'; return; }
  grid.innerHTML = items.map(r => renderCard(r, { title: r.title || r.video_id })).join('');
}

function renderWinners() {
  const grid = document.getElementById('grid-winners');
  const items = sortItems(DATA.winners.filter(w => bodyMatches(w) && savesMatches(w) && searchMatches(w, ['title'])));
  if (!items.length) { grid.innerHTML = '<div class="empty">No winners yet.</div>'; return; }
  grid.innerHTML = items.map(w => renderCard(w, { title: w.title || `${fmtNum(w.saves)} saves` })).join('');
}

const RENDERED = { visual: false, exercises: false, ctas: false, winners: false, references: false };

function renderActive() {
  const t = STATE.tab;
  if (t === 'visual') { renderVisual(); RENDERED.visual = true; }
  if (t === 'exercises') { renderExercises(); RENDERED.exercises = true; }
  if (t === 'ctas') { renderCTAs(); RENDERED.ctas = true; }
  if (t === 'winners') { renderWinners(); RENDERED.winners = true; }
  if (t === 'references') { renderReferences(); RENDERED.references = true; }
  wireVideos();
}

function invalidateAll() {
  RENDERED.visual = RENDERED.exercises = RENDERED.ctas = RENDERED.winners = RENDERED.references = false;
}

function render() { invalidateAll(); renderActive(); }

function setTab(tab) {
  STATE.tab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  document.querySelectorAll('[data-tabs]').forEach(row => {
    const tabs = (row.dataset.tabs || '').split(',');
    row.style.display = tabs.includes(tab) ? '' : 'none';
  });
  if (!RENDERED[tab]) renderActive();
}

function bindFilters() {
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => setTab(t.dataset.tab));
  document.querySelectorAll('.chip[data-body]').forEach(c => c.onclick = () => {
    document.querySelectorAll('.chip[data-body]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    STATE.body = c.dataset.body;
    render();
  });
  document.querySelectorAll('.chip[data-visual]').forEach(c => c.onclick = () => {
    c.classList.toggle('active');
    if (c.classList.contains('active')) STATE.visual.add(c.dataset.visual);
    else STATE.visual.delete(c.dataset.visual);
    renderVisual();
  });
  document.querySelectorAll('.chip[data-creator]').forEach(c => c.onclick = () => {
    document.querySelectorAll('.chip[data-creator]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    STATE.creator = c.dataset.creator;
    if (STATE.tab === 'visual') renderVisual();
  });
  document.querySelectorAll('.chip[data-ref-creator]').forEach(c => c.onclick = () => {
    document.querySelectorAll('.chip[data-ref-creator]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    STATE.refCreator = c.dataset.refCreator;
    renderReferences();
  });
  document.querySelectorAll('.chip[data-beat]').forEach(c => c.onclick = () => {
    c.classList.toggle('active');
    if (c.classList.contains('active')) STATE.beats.add(c.dataset.beat);
    else STATE.beats.delete(c.dataset.beat);
    renderCTAs();
  });
  document.querySelectorAll('.chip[data-saves]').forEach(c => c.onclick = () => {
    document.querySelectorAll('.chip[data-saves]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    STATE.minSaves = parseInt(c.dataset.saves, 10) || 0;
    render();
  });
  document.querySelectorAll('.chip[data-sort]').forEach(c => c.onclick = () => {
    document.querySelectorAll('.chip[data-sort]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    STATE.sort = c.dataset.sort;
    render();
  });
}

document.getElementById('cnt-visual').textContent = DATA.hooks.length;
document.getElementById('cnt-exercises').textContent = DATA.exercises.length;
document.getElementById('cnt-ctas').textContent = DATA.ctas.length;
document.getElementById('cnt-winners').textContent = DATA.winners.length;
document.getElementById('cnt-references').textContent = DATA.references.length;

// Autoplay-on-scroll. Videos load + play muted when in viewport, pause when out.
const io = new IntersectionObserver((entries) => {
  for (const e of entries) {
    const v = e.target;
    if (e.isIntersecting) {
      if (!v.src && v.dataset.src) v.src = v.dataset.src;
      v.play().catch(()=>{});
    } else {
      v.pause();
    }
  }
}, { threshold: 0.3 });

function wireVideos() {
  document.querySelectorAll('video[data-src]').forEach(v => {
    if (!v.dataset.observed) {
      v.dataset.observed = '1';
      io.observe(v);
    }
  });
}

bindFilters();
setTab('visual');
renderActive();
</script>
</body>
</html>
